<div
  class="modal-overlay inventory-overlay"
  *ngIf="isOpen || isClosing"
  [class.closing]="isClosing"
  (click)="closeWithAnimation()"
>
  <div
    class="modal inventory-modal"
    (click)="$event.stopPropagation()"
    [class.closing]="isClosing"
  >
    <div
      class="drag-handle"
      (touchstart)="onHeaderTouchStart($event)"
      (touchmove)="onHeaderTouchMove($event)"
      (touchend)="onHeaderTouchEnd()"
    >
      <div class="drag-handle-bar"></div>
    </div>

    <div
      class="settings-header"
      (touchstart)="onHeaderTouchStart($event)"
      (touchmove)="onHeaderTouchMove($event)"
      (touchend)="onHeaderTouchEnd()"
    >
      <div class="settings-title">
        <div class="settings-icon">🎒</div>
        <h2>Inventar</h2>
      </div>
      <button class="close-btn" (click)="closeWithAnimation()">✕</button>
    </div>

    <div class="inventory-list-container">
      <ng-container *ngIf="inventoryService.getBombStacks().length > 0; else empty">
  <p class="section-label">Bomben</p>
  <div class="item-grid">
    <div
      class="item-card"
      *ngFor="let stack of inventoryService.getBombStacks()"
      (click)="onActivate(stack.item)"
    >
      <div class="item-icon">{{ stack.item.icon }}</div>
      <div class="item-name">{{ stack.item.name }}</div>
      <div class="item-radius">{{ stack.item.bombRadius }}m Radius</div>
      <div class="item-count" *ngIf="stack.count > 1">{{ stack.count }}x</div>
      <div class="item-activate">Aktivieren</div>
    </div>
  </div>
</ng-container>


      <ng-template #empty>
        <div class="empty-state">
          <div class="empty-icon">🎒</div>
          <p>Dein Inventar ist leer.</p>
          <small>Bomben erhältst du im Shop oder als Loot.</small>
        </div>
      </ng-template>
    </div>
  </div>
</div>
