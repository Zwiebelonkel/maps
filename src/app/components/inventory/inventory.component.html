<div
  class="inventory-overlay"
  *ngIf="isOpen || isClosing"
  [class.closing]="isClosing"
  (click)="closeWithAnimation()"
>
  <div
    class="inventory-modal"
    (click)="$event.stopPropagation()"
    [class.closing]="isClosing"
  >
    <div
      class="drag-handle"
      (touchstart)="onHeaderTouchStart($event)"
      (touchmove)="onHeaderTouchMove($event)"
      (touchend)="onHeaderTouchEnd()"
    >
      <div class="drag-handle-bar"></div>
    </div>

    <div
      class="settings-header"
      (touchstart)="onHeaderTouchStart($event)"
      (touchmove)="onHeaderTouchMove($event)"
      (touchend)="onHeaderTouchEnd()"
    >
      <div class="settings-title">
        <div class="settings-icon">🎒</div>
        <h2>Inventar</h2>
      </div>
      <button class="close-btn" (click)="closeWithAnimation()">✕</button>
    </div>

    <div class="inventory-list-container">
      <ng-container *ngIf="inventoryService.getBombs().length > 0; else empty">
        <p class="section-label">Bomben</p>
        <div class="item-grid">
          <div
            class="item-card"
            *ngFor="let item of inventoryService.getBombs(); let i = index"
            (click)="onActivate(item, i)"
          >
            <div class="item-icon">{{ item.icon }}</div>
            <div class="item-name">{{ item.name }}</div>
            <div class="item-radius">{{ item.bombRadius }}m Radius</div>
            <div class="item-activate">Aktivieren</div>
          </div>
        </div>
      </ng-container>

      <ng-template #empty>
        <div class="empty-state">
          <div class="empty-icon">🎒</div>
          <p>Dein Inventar ist leer.</p>
          <small>Bomben erhältst du im Shop oder als Loot.</small>
        </div>
      </ng-template>
    </div>
  </div>
</div>
