<div
  class="modal-overlay marker-overlay"
  *ngIf="isOpen || isClosing"
  [class.closing]="isClosing"
  (click)="closeWithAnimation()"
>
  <div
    class="modal marker-modal"
    (click)="$event.stopPropagation()"
    [class.closing]="isClosing"
  >
    <!-- Drag Handle -->
    <div
      class="drag-handle"
      (touchstart)="onHeaderTouchStart($event)"
      (touchmove)="onHeaderTouchMove($event)"
      (touchend)="onHeaderTouchEnd()"
    >
      <div class="drag-handle-bar"></div>
    </div>

    <!-- Header -->
    <div
      class="settings-header"
      (touchstart)="onHeaderTouchStart($event)"
      (touchmove)="onHeaderTouchMove($event)"
      (touchend)="onHeaderTouchEnd()"
    >
      <div class="settings-title">
        <div class="settings-icon">📍</div>
        <h2>Marker</h2>
      </div>

      <button class="close-btn" (click)="closeWithAnimation()">✖️</button>
    </div>

    <!-- LIST -->
    <div class="marker-list-container">
      <div class="setting-item" *ngFor="let marker of markerService.getAll()">
        <!-- 👁️ VIEW MODE -->
        <div
          *ngIf="editingMarkerId !== marker.id"
          class="setting-info"
          (click)="selectMarker(marker)"
        >
          <div class="setting-icon">📍</div>

          <div class="setting-content">
            <div class="setting-label">{{ marker.name }}</div>
            <div class="setting-desc">
              {{ marker.description || "Keine Beschreibung" }}
            </div>
          </div>

          <div class="marker-actions">
            <button
              class="edit-btn"
              (click)="startEdit(marker); $event.stopPropagation()"
            >
              ✏️
            </button>

            <button
              class="delete-btn"
              (click)="delete(marker); $event.stopPropagation()"
            >
              🗑️
            </button>
          </div>
        </div>

        <!-- ✏️ EDIT MODE -->
        <div *ngIf="editingMarkerId === marker.id" class="edit-container">
          <input [(ngModel)]="editName" placeholder="Name" class="edit-input" />

          <input
            [(ngModel)]="editDescription"
            placeholder="Beschreibung"
            class="edit-input"
          />

          <div class="edit-actions">
            <button class="save-btn" (click)="saveEdit(marker)">💾</button>
            <button class="cancel-btn" (click)="cancelEdit()">✖️</button>
          </div>
        </div>
      </div>

      <!-- EMPTY STATE -->
      <div class="empty-state" *ngIf="markerService.getAll().length === 0">
        📭 Keine Marker vorhanden
      </div>
    </div>
  </div>
</div>
