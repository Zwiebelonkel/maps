<div
  class="modal-overlay"
  *ngIf="isOpen || isClosing"
  [class.closing]="isClosing"
  (click)="closeWithAnimation()"
>
  <div
    class="modal"
    (click)="$event.stopPropagation()"
    [class.closing]="isClosing"
  >
    <div class="drag-handle">
      <div class="drag-handle-bar"></div>
    </div>

    <div class="modal-header">
      <h2>🎒 Gear</h2>
      <button class="close-btn" (click)="closeWithAnimation()">✕</button>
    </div>

    <!-- Ausgerüstete Slots -->
    <div class="gear-slots">
      <div
        class="gear-slot"
        *ngFor="let slot of [0, 1]"
        [class.filled]="player.equipped[slot]"
      >
        <ng-container *ngIf="player.equipped[slot] as id">
          <div class="gear-slot-icon">{{ getOutfit(id)?.icon }}</div>
          <div class="gear-slot-info">
            <div class="gear-slot-name">{{ getOutfit(id)?.name }}</div>
            <div class="gear-slot-effect">
              {{ getOutfit(id)?.effect?.icon }}
              {{ getOutfit(id)?.effect?.label }}
            </div>
          </div>
          <button class="gear-slot-remove" (click)="unequip(id)">✕</button>
        </ng-container>
        <ng-container *ngIf="!player.equipped[slot]">
          <div class="gear-slot-empty">Leer</div>
        </ng-container>
      </div>
    </div>

    <!-- Liste -->
    <div class="outfit-list">
      <div
        class="outfit-row"
        *ngFor="let outfit of outfits"
        [class.locked]="!isUnlocked(outfit.id)"
        [class.active]="player.isEquipped(outfit.id)"
        [class.selected]="selectedOutfit?.id === outfit.id"
        (click)="preview(outfit)"
      >
        <div class="outfit-row-icon">{{ outfit.icon }}</div>
        <div class="outfit-row-content">
          <div class="outfit-row-name">{{ outfit.name }}</div>
          <div class="outfit-row-effect">
            {{ outfit.effect.icon }} {{ outfit.effect.label }}
          </div>
        </div>
        <div class="outfit-row-right">
          <div class="rarity-dot" [attr.data-rarity]="outfit.rarity"></div>
          <span
            class="status-badge equipped"
            *ngIf="player.isEquipped(outfit.id)"
            >Aktiv</span
          >
          <span class="status-badge locked-badge" *ngIf="!isUnlocked(outfit.id)"
            >🔒</span
          >
        </div>
      </div>
    </div>

    <!-- Ausrüsten -->
    <div
      class="outfit-actions"
      *ngIf="selectedOutfit && isUnlocked(selectedOutfit.id)"
    >
      <button
        class="equip-btn"
        [class.already-equipped]="player.isEquipped(selectedOutfit.id)"
        (click)="equip()"
      >
        {{
          player.isEquipped(selectedOutfit.id) ? "✓ Ausgerüstet" : "Ausrüsten"
        }}
      </button>
    </div>
  </div>
</div>
