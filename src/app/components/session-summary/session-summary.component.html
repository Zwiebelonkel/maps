<div
  class="modal-overlay summary-overlay"
  *ngIf="isOpen || isClosing"
  [class.closing]="isClosing"
  (click)="closeWithAnimation()"
>
  <div
    class="modal summary-modal"
    [class.closing]="isClosing"
    (click)="$event.stopPropagation()"
  >

    <div
      class="drag-handle"
      (touchstart)="onHeaderTouchStart($event)"
      (touchmove)="onHeaderTouchMove($event)"
      (touchend)="onHeaderTouchEnd()"
    >
      <div class="drag-handle-bar"></div>
    </div>

    <div
      class="summary-header"
      (touchstart)="onHeaderTouchStart($event)"
      (touchmove)="onHeaderTouchMove($event)"
      (touchend)="onHeaderTouchEnd()"
    >
      <div class="summary-title">
        <span>🏁</span>
        <h2>Session beendet</h2>
      </div>
      <button class="close-btn" (click)="closeWithAnimation()">✕</button>
    </div>

    <!-- Map -->
    <div class="map-preview">
      <img *ngIf="mapImageUrl" [src]="mapImageUrl" />
      <div *ngIf="!mapImageUrl" class="map-placeholder">
        📍 Route wird geladen...
      </div>
    </div>

    <!-- Stats -->
    <div class="summary-stats" *ngIf="stats">
      <div class="summary-stat">
        <span class="summary-stat-icon">📏</span>
        <div class="summary-stat-content">
          <div class="summary-stat-value">
            {{ sessionService.formatDistance(stats.distanceMeters) }}
          </div>
          <div class="summary-stat-label">Distanz</div>
        </div>
      </div>

      <div class="summary-stat">
        <span class="summary-stat-icon">⏱️</span>
        <div class="summary-stat-content">
          <div class="summary-stat-value">
            {{ sessionService.formatDuration(stats.startTime, stats.endTime) }}
          </div>
          <div class="summary-stat-label">Dauer</div>
        </div>
      </div>

      <div class="summary-stat">
        <span class="summary-stat-icon">🗺️</span>
        <div class="summary-stat-content">
          <div class="summary-stat-value">{{ stats.tilesExplored | number:'1.2-2' }}</div>
          <div class="summary-stat-label">Tiles</div>
        </div>
      </div>

      <div class="summary-stat">
        <span class="summary-stat-icon">👣</span>
        <div class="summary-stat-content">
          <div class="summary-stat-value">{{ stats.stepCount | number:'1.0-0' }}</div>
          <div class="summary-stat-label">Schritte</div>
        </div>
      </div>
    </div>

    <div class="summary-footer">
      <button
        class="share-btn"
        *ngIf="mapImageUrl"
        (click)="shareRouteScreenshot()"
      >
        📤 Route Screenshot teilen
      </button>
      <button class="done-btn" (click)="closeWithAnimation()">
        Fertig
      </button>
    </div>

  </div>
</div>
