<div
  class="modal-overlay black-market-overlay"
  *ngIf="isOpen"
  [class.closing]="isClosing"
  (click)="onOverlayClick()"
>
  <div
    class="modal black-market-modal"
    [class.closing]="isClosing"
    (click)="$event.stopPropagation()"
  >
    <div
      class="drag-handle"
      (touchstart)="onHeaderTouchStart($event)"
      (touchmove)="onHeaderTouchMove($event)"
      (touchend)="onHeaderTouchEnd()"
      (touchcancel)="onHeaderTouchCancel()"
    >
      <div class="drag-handle-bar"></div>
    </div>

    <div
      class="settings-header"
      (touchstart)="onHeaderTouchStart($event)"
      (touchmove)="onHeaderTouchMove($event)"
      (touchend)="onHeaderTouchEnd()"
      (touchcancel)="onHeaderTouchCancel()"
    >
      <div class="settings-title">
        <div class="setting-icon">🕶️</div>

        <div>
          <h2>Black Market</h2>
          <p class="black-market-subtitle">Seltene Ausrüstung</p>
        </div>
      </div>

      <button class="close-btn" type="button" (click)="onClose()">✕</button>
    </div>

    <div class="coins-display">
      <span class="coins-label">Coins</span>
      <span class="coins-value">🪙 {{ totalCoins | number: '1.2-2' }}</span>
    </div>

    <div class="black-market-content" *ngIf="offers.length > 0; else noOffers">
      <div
        class="setting-item offer-card"
        *ngFor="let offer of offers"
        [style.--rarity-color]="getRarityColor(offer.outfit.rarity)"
      >
        <div class="setting-info">
          <div class="setting-icon outfit-icon">
            {{ offer.outfit.icon }}
          </div>

          <div class="setting-content">
            <div class="setting-label">
              {{ offer.outfit.name }}
            </div>

            <div class="setting-desc rarity-label">
              {{ offer.outfit.rarity | uppercase }}
            </div>
          </div>

          <div class="rarity-dot"></div>
        </div>

        <div class="item-description">
          {{ offer.outfit.description }}
        </div>

        <div class="offer-bottom">
          <div class="item-price">
            {{ offer.price | number: '1.2-2' }} 🪙
          </div>

          <button
            class="buy-btn"
            type="button"
            [disabled]="!canAfford(offer.price) || isUnlocked(offer.outfit.id)"
            (click)="onPurchase(offer)"
          >
            {{
              isUnlocked(offer.outfit.id)
                ? 'Freigeschaltet'
                : canAfford(offer.price)
                  ? 'Kaufen'
                  : 'Zu teuer'
            }}
          </button>
        </div>
      </div>
    </div>

    <ng-template #noOffers>
      <p class="empty-state">Heute gibt es keine Angebote.</p>
    </ng-template>
  </div>
</div>
