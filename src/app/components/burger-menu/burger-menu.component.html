<div
  class="modal-overlay burger-overlay"
  *ngIf="isOpen || isClosing"
  [class.closing]="isClosing"
  (click)="closeWithAnimation()"
>
  <div
    class="modal burger-modal"
    (click)="$event.stopPropagation()"
    [class.closing]="isClosing"
  >
    <div
      class="drag-handle"
      (touchstart)="onHeaderTouchStart($event)"
      (touchmove)="onHeaderTouchMove($event)"
      (touchend)="onHeaderTouchEnd()"
    >
      <div class="drag-handle-bar"></div>
    </div>

    <div
      class="settings-header"
      (touchstart)="onHeaderTouchStart($event)"
      (touchmove)="onHeaderTouchMove($event)"
      (touchend)="onHeaderTouchEnd()"
    >
      <div class="settings-title">
        <div class="settings-icon">☰</div>
        <h2>Menü</h2>
      </div>

      <button class="close-btn" (click)="closeWithAnimation()">✕</button>
    </div>
    <div class="setting-item" (click)="onPlayer()">
  <div class="setting-info">
    <div class="setting-icon">👤</div>

    <!-- 🔴 Badge -->
    <span
      *ngIf="notification.hasAnyNewOutfits()"
      class="badge"
    ></span>

    <div class="setting-content">
      <div class="setting-label">Player</div>
      <div class="setting-desc">Ausrüstung auswählen</div>
    </div>
  </div>
</div>
    <div class="setting-item" (click)="onInventory()">
  <div class="setting-info">
    <div class="setting-icon">🎒</div>
    <div class="setting-content">
      <div class="setting-label">Inventar</div>
      <div class="setting-desc">{{ inventoryService.getBombStacks().length }} Bomben verfügbar</div>
    </div>
  </div>
</div>
    <div class="setting-item" (click)="onLootbox()">
      <div class="setting-info">
        <div class="setting-icon">🎁</div>
        <div class="setting-content">
          <div class="setting-label">Lootbox</div>
          <div class="setting-desc">{{ lootboxes }} verfügbar</div>
        </div>
      </div>
    </div>
    <div class="setting-item" (click)="onSession()">
      <div class="setting-info">
        <div class="setting-icon">▶️</div>
        <div class="setting-content">
          <div class="setting-label">Session</div>
          <div class="setting-desc">Start / Stop</div>
        </div>
      </div>
    </div>

    <div class="setting-item" (click)="onSettings()">
      <div class="setting-info">
        <div class="setting-icon">⚙️</div>
        <div class="setting-content">
          <div class="setting-label">Settings</div>
          <div class="setting-desc">App Einstellungen</div>
        </div>
      </div>
    </div>

    <div class="setting-item" (click)="onMarkers()">
      <div class="setting-info">
        <div class="setting-icon">📍</div>
        <div class="setting-content">
          <div class="setting-label">Marker</div>
          <div class="setting-desc">Liste anzeigen</div>
        </div>
      </div>
    </div>
  </div>
</div>
