<div class="modal-overlay" *ngIf="isOpen" (click)="onClose()">
  <div class="modal black-market-modal" (click)="$event.stopPropagation()">
    <div class="drag-handle">
      <div class="drag-handle-bar"></div>
    </div>

    <div class="modal-header">
      <h2>🕶️ Black Market</h2>
      <button class="close-btn" (click)="onClose()">✖️</button>
    </div>

    <div class="coins-display">
      <span>🪙 {{ totalCoins | number: '1.2-2' }}</span>
    </div>

    <div class="offers" *ngIf="offers.length > 0; else noOffers">
      <div class="offer-card" *ngFor="let offer of offers">
        <div class="item-name">{{ offer.outfit.icon }} {{ offer.outfit.name }}</div>
        <div class="item-description">{{ offer.outfit.description }}</div>
        <div class="item-rarity">{{ offer.outfit.rarity | uppercase }}</div>
        <div class="item-price">{{ offer.price | number: '1.2-2' }} 🪙</div>
        <button [disabled]="!canAfford(offer.price) || isUnlocked(offer.outfit.id)" (click)="onPurchase(offer)">
          {{
            isUnlocked(offer.outfit.id)
              ? 'Bereits freigeschaltet'
              : canAfford(offer.price)
                ? 'Kaufen'
                : 'Nicht genug Coins'
          }}
        </button>
      </div>
    </div>

    <ng-template #noOffers>
      <p class="empty-state">Heute gibt es keine Angebote.</p>
    </ng-template>
  </div>
</div>
