<div class="settings-overlay" *ngIf="isOpen" (click)="toggle()">
  <div class="settings-modal" (click)="$event.stopPropagation()">
    <!-- Header -->
    <div class="settings-header">
      <div class="settings-title">
        <span class="settings-icon">⚙️</span>
        <h2>Einstellungen</h2>
      </div>
      <button class="close-btn" (click)="toggle()">✕</button>
    </div>

    <!-- Max Render Tiles -->
    <div class="setting-item">
      <div class="setting-info">
        <span class="setting-icon">🗺️</span>
        <div class="setting-content">
          <div class="setting-label">Max Render Tiles</div>
          <div class="setting-desc">Höher = mehr sichtbare Tiles</div>
        </div>
        <div class="setting-value">{{ maxRenderTiles }}</div>
      </div>
      <input
        type="range"
        min="100"
        max="50000"
        step="100"
        [value]="maxRenderTiles"
        (input)="updateMaxRenderTiles(+$any($event.target).value)"
      />
    </div>

    <!-- Stromsparmodus -->
    <div class="setting-item">
      <div class="setting-info">
        <span class="setting-icon">🔋</span>
        <div class="setting-content">
          <div class="setting-label">Stromsparmodus</div>
          <div class="setting-desc">Doppeltippen zum Deaktivieren</div>
        </div>
        <button
          class="toggle-btn"
          [class.active]="settings.snapshot.powerSave"
          (click)="settings.update({ powerSave: !settings.snapshot.powerSave })"
        >
          {{ settings.snapshot.powerSave ? "AN" : "AUS" }}
        </button>
      </div>
    </div>

    <!-- Reset -->
 <!-- Footer -->
<div class="settings-footer">
  <button class="reset-settings-btn" (click)="reset()">♻️ Einstellungen zurücksetzen</button>
  <button class="reset-game-btn" (click)="resetGame()">🗑️ Spielfortschritt löschen</button>
</div>

  </div>
</div>
